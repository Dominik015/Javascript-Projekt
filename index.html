<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
    <title>Document</title>
</head>
<body>
    <h1>Player Stats:</h1><br>
    <p>Health: <span id="hp"></span></p><br>
    <p>Damage: <span id="dmg"></span></p><br>
    <p>Speed: <span id="speed"></span></p>
    <div id="content">
    <div id="GameContainer">
        <canvas id="Game" width="700" height="700"></canvas>
        
        <button id="playButton">PLAY</button><br>
        <button id="Reset">Reset</button>
        <div id="buffcards">
        <button id="card1"></button>
        <button id="card2"></button>
        <button id="card3"></button>
        </div>
    </div>
    </div>
    
    <h1>Enemy Stats:</h1><br>

    <p>Enemy Health: <span id="enemyHealth"></span></p><br>
    <p>Enemy Damage: <span id="enemyDamage"></span></p>
    <p>Wave: <span id="wave"></span></p>
</body>
</html>
